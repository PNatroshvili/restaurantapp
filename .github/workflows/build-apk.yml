name: Build Release APK

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 1.3.1)'
        required: false
        default: '1.3.0'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Resolve version
        id: ver
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "name=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "name=${{ github.event.inputs.version_name || '1.3.0' }}" >> $GITHUB_OUTPUT
            echo "tag=v${{ github.event.inputs.version_name || '1.3.0' }}-build.${{ github.run_number }}" >> $GITHUB_OUTPUT
          fi

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build release APK
        run: |
          cd android
          ./gradlew assembleRelease \
            -PreactNativeArchitectures=arm64-v8a,armeabi-v7a \
            -Pandroid.versionCode=${{ github.run_number }} \
            -Pandroid.versionName=${{ steps.ver.outputs.name }}
        env:
          GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4096m'
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk \
             RestaurantApp-${{ steps.ver.outputs.tag }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: RestaurantApp-${{ steps.ver.outputs.tag }}
          path: RestaurantApp-${{ steps.ver.outputs.tag }}.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Restaurant App ${{ steps.ver.outputs.tag }}
          files: RestaurantApp-${{ steps.ver.outputs.tag }}.apk
          generate_release_notes: true
          body: |
            ## 🍽️ Restaurant App ${{ steps.ver.outputs.tag }}

            **Download the APK below and install on your Android device.**

            > Enable "Install from unknown sources" in Android settings if prompted.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
